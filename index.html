<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생활체육지도사 2급 — 핵심 문제 학습지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');

  :root {
    --blue-dark: #1a3a5c;
    --blue-mid: #2563a8;
    --blue-light: #dbeafe;
    --blue-pale: #f0f6ff;
    --green-dark: #145a32;
    --green-mid: #1e8449;
    --green-light: #d4efdf;
    --gray: #f5f6fa;
    --border: #d0d8e8;
    --text: #1a1a2e;
    --muted: #6b7a99;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #eef2f8;
    color: var(--text);
    padding: 32px 16px;
  }

  .container { max-width: 980px; margin: 0 auto; }

  /* 제목 */
  .title-block {
    text-align: center;
    margin-bottom: 32px;
    padding: 32px 24px 28px;
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(37,99,168,.10);
    border-top: 6px solid var(--blue-mid);
  }
  .title-block h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--blue-dark);
  }
  .title-block p { margin-top: 8px; font-size: .95rem; color: var(--muted); font-weight: 500; }
  .badge-row { display: flex; justify-content: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .badge {
    background: var(--blue-pale);
    color: var(--blue-mid);
    border: 1px solid var(--blue-light);
    border-radius: 999px;
    padding: 3px 12px;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .badge:hover {
    background: var(--blue-mid);
    color: #fff;
  }

  /* 탭 */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 22px;
    border-radius: 999px;
    border: 2px solid var(--border);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .88rem;
    font-weight: 700;
    cursor: pointer;
    background: var(--white);
    color: var(--muted);
    transition: all .2s;
  }
  .tab-btn.active-q { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .tab-btn.active-a { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

  /* 섹션/챕터 */
  .section { display: none; }
  .section.visible { display: block; }
  .chapter { margin-bottom: 28px; }

  .chapter-title {
    font-size: 1rem;
    font-weight: 900;
    padding: 9px 18px;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chapter-title.blue { background: var(--blue-dark); color: #fff; }
  .chapter-title.green { background: var(--green-dark); color: #fff; }

  /* 테이블 */
  .q-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  .q-table th {
    padding: 9px 13px;
    font-size: .8rem;
    font-weight: 700;
    text-align: left;
  }
  .q-table th.blue { background: var(--blue-mid); color: #fff; }
  .q-table th.green { background: var(--green-mid); color: #fff; }
  .q-table th.center { text-align: center; }
  .q-table td {
    padding: 9px 13px;
    border-top: 1px solid var(--border);
    font-size: .86rem;
    vertical-align: middle;
    line-height: 1.55;
  }
  .q-table tr:nth-child(even) td { background: var(--gray); }
  .q-table tr:nth-child(odd) td { background: var(--white); }

  .num-cell { text-align: center; font-weight: 700; width: 40px; color: var(--muted); font-size: .82rem; }
  .q-cell { width: 40%; font-weight: 500; }
  .answer-text { color: var(--green-dark); font-weight: 500; }

  /* 입력칸 */
  .blank-cell {
    width: 100%;
    min-height: 34px;
    border: none;
    border-bottom: 1.5px solid #bbb;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .86rem;
    color: var(--text);
    resize: none;
    outline: none;
    padding: 3px 2px;
    line-height: 1.5;
    overflow: hidden;
  }
  .blank-cell:focus {
    border-bottom: 2px solid var(--blue-mid);
    background: var(--blue-pale);
  }

  /* 버튼들 */
  .btn-row { display: flex; gap: 6px; margin-top: 5px; align-items: center; }
  .reset-btn {
    background: none;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    color: #999;
    font-size: .72rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    padding: 2px 9px;
    white-space: nowrap;
    transition: all .15s;
  }
  .reset-btn:hover { border-color: #e55; color: #e55; background: #fff0f0; }

  .answer-btn {
    background: none;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    color: #999;
    font-size: .72rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    padding: 2px 9px;
    white-space: nowrap;
    transition: all .15s;
    position: relative;
  }
  .answer-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-pale); }
  .answer-btn.active { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-pale); }

  .answer-tooltip {
    display: none;
    position: fixed;
    background: #1a3a5c;
    color: #fff;
    font-size: .8rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    padding: 11px 15px;
    border-radius: 10px;
    white-space: pre-wrap;
    width: min(340px, 88vw);
    line-height: 1.65;
    box-shadow: 0 6px 24px rgba(0,0,0,.35);
    z-index: 9999;
    pointer-events: none;
  }
  .answer-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 20px;
    border: 7px solid transparent;
    border-top-color: #1a3a5c;
  }
  .answer-btn.active .answer-tooltip { display: block; }

  /* 인쇄 */
  .print-hint { text-align: center; margin-bottom: 18px; font-size: .8rem; color: var(--muted); }
  .print-hint button {
    margin-left: 10px;
    padding: 6px 16px;
    background: var(--blue-mid);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .8rem;
    font-weight: 700;
    cursor: pointer;
  }
  .print-hint button:hover { background: var(--blue-dark); }

  @media print {
    body { background: #fff; padding: 0; }
    .tabs, .print-hint { display: none !important; }
    .section { display: block !important; }
    .chapter { page-break-inside: avoid; margin-bottom: 20px; }
    .title-block { box-shadow: none; }
  }

  /* 비교표 */
  .comp-wrap {
    background: var(--white);
    border-radius: 0 0 10px 10px;
    overflow-x: auto;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  .comp-table {
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
  }
  .comp-table th {
    padding: 10px 12px;
    font-size: .82rem;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    color: #fff;
    background: var(--blue-mid);
    border: 1px solid #1a5cb0;
  }
  .comp-table th.row-head { background: var(--blue-dark); }
  .comp-table td {
    padding: 9px 12px;
    font-size: .82rem;
    border: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.55;
  }
  .comp-table td.row-label {
    font-weight: 700;
    background: var(--blue-pale);
    color: var(--blue-dark);
    white-space: nowrap;
    text-align: center;
    width: 90px;
  }
  .comp-table tr:nth-child(even) td:not(.row-label) { background: var(--gray); }
  .comp-table tr:nth-child(odd) td:not(.row-label) { background: var(--white); }

</style>
</head>
<body>
<div class="container">

  <div class="title-block">
    <h1>생활체육지도사 2급 자격증</h1>
    <p>핵심 문제 암기 학습지 &nbsp;|&nbsp; 문제지 + 답지</p>
    <div class="badge-row">
      <span class="badge" onclick="jumpTo('응급처치')">🚑 응급처치 18문항</span>
      <span class="badge" onclick="jumpTo('도핑')">💊 도핑 12문항</span>
      <span class="badge" onclick="jumpTo('보디빌딩기본')">🏆 보디빌딩 기본 11문항</span>
      <span class="badge" onclick="jumpTo('남성부비교표')">💪 남성부 종목 비교표</span>
      <span class="badge" onclick="jumpTo('여성부비교표')">👙 여성부 종목 비교표</span>
      <span class="badge" onclick="jumpTo('스포츠인권')">🤝 스포츠 인권 20문항</span>
      <span class="badge" onclick="jumpTo('운동생리학')">⚡ 운동생리학 67문항</span>
      <span class="badge" onclick="jumpTo('기능해부학')">🦴 기능 해부학 29문항</span>
      <span class="badge" onclick="jumpTo('웨이트트레이닝')">🏋️ 웨이트 트레이닝 27문항</span>
      <span class="badge" onclick="jumpTo('운동영양학')">🥗 운동 영양학 35문항</span>
      <span class="badge" onclick="jumpTo('생활체육')">🏃 생활체육 개요 25문항</span>
    </div>
  </div>

  <div class="print-hint">
    브라우저에서 바로 공부하거나, 인쇄해서 사용하세요.
    <button onclick="window.print()">🖨️ 인쇄하기</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active-q" onclick="showTab('q')">📝 문제지 (답변 직접 작성)</button>
    <button class="tab-btn" onclick="showTab('a')">✅ 답지 (정답 확인)</button>
  </div>

  <!-- 문제지 -->
  <div id="tab-q" class="section visible" id="section-q"></div>

  <!-- 답지 -->
  <div id="tab-a" class="section" id="section-a"></div>

</div>

<script>
// ══════════════════════════════════════════════
// 데이터: [번호, 질문, 정답]
// ══════════════════════════════════════════════

const chapters = [
  {
    title: "🚑 응급처치",
    data: [
      [1,"응급처치란?","골든타임 내 최소한의 긴급처치로 생명을 구하고 치료시간을 단축 / 하임리히법(기도폐쇄) / 심폐소생술(심정지) / RICES(염좌·타박상)"],
      [2,"응급처치의 3C","CHECK(환자 의식·주변 안전 확인) / CALL(119 신고) / CARE(구조대 도착 전까지 응급처치)"],
      [3,"PRICES 처치법","P: 보호 / R: 안정 / I: 얼음찜질(붓기↓·통증↓) / C: 압박(붓기 방지) / E: 상처 부위를 심장보다 높게 / S: 움직임 최소화"],
      [4,"의식 있는 환자 & 없는 환자의 응급처치","공통: 119 신고 / 의식 있으면: RICES / 의식 없으면: CPR 진행, 기도 막혔으면 하임리히법"],
      [5,"출혈환자·골절환자의 응급처치","출혈환자: 출혈부위 압박·드레싱, 상처를 심장보다 높게 / 골절환자: 삼각건·부목으로 고정 후 PRICES 기법"],
      [6,"원인·피부 손상에 따른 골절 종류","원인: 외상성·피로·병적 골절 / 피부 손상: 폐쇄성(피부 손상 없음)·개방성(피부 밖으로 뼈 노출)"],
      [7,"출혈 환자에게 드레싱을 하는 이유","상처부위 노출 방지 / 압박 / 체액과 이물질 흡수"],
      [8,"CPR 정의와 방법","심정지 환자의 심장·호흡을 되살리기 위한 응급처치 / 유두 사이에 손꿈치 대고 양팔 폄 / 분당 100~120회, 5cm 깊이로 압박"],
      [9,"CPCR이란?","기존 심폐소생술에 뇌기능 회복을 포함시킨 개념. 호흡 정지 시 심장을 회복시켜 뇌로 산소를 공급"],
      [10,"AED란?, AED 사용법","심정지 환자의 심장에 전기충격을 가해 심장박동을 회복시키는 장치 / ① 전원 켜기 ② 패드 부착(우측 쇄골 아래, 좌측 갈비뼈 아래) ③ 심장 리듬 분석 ④ 전기충격 ⑤ CPR 반복"],
      [11,"AED 사용 시 주의사항","물기 있는 곳 사용 금지(젖어 있으면 닦고 실시) / 악세사리 위에 패드 부착 금지 / 털이 많으면 제거 후 부착 / 감전 방지를 위해 멀리 떨어지기"],
      [12,"쇼크의 종류와 의미 (가출하면 줘 패심)","과민성(알러지) / 출혈성(출혈) / 저혈압성(출혈·탈수) / 패혈성(감염) / 심장성(심장 기능 저하)"],
      [13,"심박출량의 의미와 공식","1분간 심장에서 혈액이 나가는 양 / 1회 박출량 × 1분 심박동수"],
      [14,"저체온증의 정의와 응급처치","체온이 35도 이하로 떨어져 신체 기능이 저하되는 상태 / 따뜻한 장소로 이동 → 젖은 옷 제거 → 담요로 체온 유지 → 따뜻한 음료 제공 → 119 신고"],
      [15,"2도 화상 증상과 응급처치법","증상: 진피층까지 화상, 수포·작열감·극심한 통증 / 처치: 악세서리 제거 → 냉각 → 화상연고 → 깨끗한 천으로 감싸 병원 이송"],
      [16,"심정지 환자 대처법","반응 확인 → 호흡 확인 → 도움 요청 및 119 신고 + AED 요청"],
      [17,"심폐소생술 핵심 프로토콜","가슴압박 30회: 인공호흡 2회(30:2) / 압박 깊이: 5~6cm / 속도: 분당 100~120회 / 위치: 흉골 중앙 / 완전 이완 필수"],
      [18,"기도폐쇄 시 응급처치","판단: 말 못함·기침 못함·숨 못 쉬고 목을 잡음 / 자세: 환자 뒤에 서서 한 손 주먹(배꼽 위 명치 아래) / 빠르고 강하게 위로 밀어올림"],
    ]
  },
  {
    title: "💊 도핑",
    data: [
      [1,"도핑이란?","경기력 향상을 위해 금지약물(호르몬제·신경안정제·흥분제 등)을 투여하는 행위"],
      [2,"금지약물 선정 기준","경기력 향상 효과 / 건강에 위험 / 스포츠 정신 위배"],
      [3,"도핑 검사 절차 10단계","(계검대통시 서시시결장) 도핑 검사 계획 수립 → 검사관 배정 → 검사 대상자 선정 → 선수에게 검사 통보 → 선수 시료 제공 입회 → 서류 작성 → 시료 운송 → 시료 분석 → 결과 관리 → 시료 장기 보관"],
      [4,"금지약물과 부작용","베타2작용제: 심박증가·부정맥 / 흥분제: 심장마비·불면증·뇌졸중 / 동화작용제: 간질환·고혈압 / 마약: 불안·환각 / 성장호르몬: 당뇨·관절 약화·신체 기형화"],
      [5,"TUE란?","선수가 질병치료·부상회복을 위해 금지약물을 사용해야 할 경우, 치료목적사용면책 국제표준에 따라 심사 후 승인하는 제도"],
      [6,"TUE 승인 기준","① 건강에 심각한 손상 우려 ② 질병 치료 목적으로 필요 ③ 경기력 향상 효과가 없음 ④ 대체 치료 방법이 없음"],
      [7,"TUE 심사 기관","치료목적사용면책위원회 (스포츠의학 학식·경험이 풍부한 의사로 구성)"],
      [8,"사후 치료목적 사용면책","응급상황에서 긴급한 의료적 치료 후 신청하는 TUE. 승인 또는 비승인 가능"],
      [9,"도핑 검사 시 소변검사를 혈액검사로 대체가 가능한가?","절대 불가능. 소변에서 검출되는 약물이 혈액에서 검출되지 않을 수 있으며, 선수 요구나 심사관 재량으로도 변경 불가"],
      [10,"도핑 방지를 위한 선수의 역할과 책무","고의·과실 불문하고 선수 스스로 책임. 병원·약국 처방 시 선수임을 밝히고 금지약물 제외 처방받아야 하며 도핑방지기구 절차에 협조"],
      [11,"경기 기간 중 도핑검사","사전미통보 원칙 적용. 사전통보 없이 언제 어디서든 검사 가능"],
      [12,"소재지 정보","경기시간 외 도핑검사의 효과적 실시를 위해 선수는 정확한 소재지를 제출. 변경 시 즉시 제출"],

      [6,"근력을 결정하는 요소","근육의 단면적(근육의 굵기) / 근섬유의 종류(지근과 속근의 비율) / 근육의 길이"],
      [7,"지근섬유와 속근섬유의 차이점","지근섬유: 산소를 이용한 에너지 생성 좋음. 수축이 느리고 힘이 약하지만 피로에 강함 / 속근섬유: 산소 없이 에너지 생성 좋음. 수축 빠르고 폭발적이고 강함. 피로에 약함"],
      [8,"근육 수축의 종류 3가지","등장성 수축: 근육 길이가 변하고 부하는 일정함(단축성·신장성 수축) / 등척성 수축: 길이변화 없이 힘만 발생(플랭크) / 등속성 수축: 같은 속도로 최대 힘(로잉)"],
      [9,"상완이두근을 이용한 등장성 수축 설명","덤벨을 들어올릴 때 근육 길이가 짧아져 단축성 수축 / 덤벨을 내릴 때 길이가 늘어나 신장성 수축"],
      [10,"위성세포란?","근육의 줄기세포. 평소에 휴지기 상태였다가 근육이 손상되면 활성화되어 손상된 근섬유와 합쳐져 근육을 재생하고 복구함"],
      [11,"ATP란?","아데노신 삼인산. 몸의 모든 생명활동에 직접적인 에너지원으로 쓰이는 분자 / 운동 강도와 지속시간에 따라 ATP를 만드는 방식(에너지 대사과정)이 달라짐 / 근육 내 저장량이 적어 지속활동을 위해 계속 재합성되어야 함"],
      [12,"ATP-PCr 시스템이란?","가장 빠르고 단순한 에너지 공급 시스템 / 근육에 저장된 인산크레아틴을 분해해 ATP를 즉시 재합성 / 10~15초 내외의 순간적인 폭발력이 필요할 때 사용"],
      [13,"무산소성 해당과정(젖산 시스템)이란?","산소 없이 근육의 글리코겐이나 포도당을 분해해 ATP를 생성하는 에너지공급시스템 / 1분~3분 지속되는 고강도 활동 시 주로 사용 / 이 과정의 부산물로 젖산이 생성됨"],
      [14,"유산소성 대사 과정이란?","산소를 이용해 탄수화물·지방 등을 완전히 분해해 다량의 ATP를 생성하는 방식 / 미토콘드리아에서 일어남 / 해당과정·TCA회로·전자전달계를 거쳐 장시간 에너지를 공급"],
      [15,"에너지 대사 시스템 3가지 설명","무산소 시스템: ATP-PC·해당과정(산소 없이 에너지 빠르게 공급, ATP 조금 생성) / 유산소 시스템: 유산소성 대사과정(산소 이용해 에너지 천천히, 다량의 ATP 생성)"],
      [16,"에너지 대사 과정·에너지 소비 순서","운동 시작 시 ATP-PC 시스템 → 무산소성 해당과정 → 장기간 운동 시 유산소성 대사과정 순서"],
      [17,"ATP 합성 과정 중 무산소성 과정 설명","ATP-PC 시스템: 인산크레아틴을 분해해 즉시 ATP로 만듦 / 무산소성 해당과정: 글리코겐을 산소 없이 분해해 ATP를 만들며 부산물로 젖산을 만듦"],
      [18,"유산소 운동과 무산소 운동 설명","유산소 운동: 낮은 강도로 장시간 지속, 산소를 이용하며 지방과 탄수화물을 에너지로 사용 / 무산소 운동: 짧은 시간에 폭발적인 힘 사용, 산소 없이 탄수화물을 에너지로 사용"],
      [19,"젖산이 생기는 원리","고강도 운동 시 산소가 부족할 때 몸이 글리코겐을 산소 없이 분해해 에너지를 만드는 무산소성 해당과정의 부산물로 생성"],
      [20,"유산소·무산소 운동에서 사용되는 영양소","유산소 운동: 지방·탄수화물 함께 사용 / 무산소 운동: 탄수화물(산소 없이 빠르게 태워야 해서) / 지방과 탄수화물이 고갈되면 단백질을 에너지원으로 사용"],
      [21,"포도당 신생합성이란?","탄수화물이 아닌 다른 물질을 재료로 포도당을 만드는 과정. 간에서 일어남 / 장시간 공복이나 격한 운동으로 당이 떨어질 때 젖산·아미노산·글리세롤을 이용해 포도당을 공급"],
      [22,"반응성 저혈당이란?","당뇨병이 없는 사람이 식사 후 2~4시간 내에 혈당이 정상 이하로 떨어지는 상태 / 정제 탄수화물 섭취로 인한 인슐린 과다분비가 원인 / 손떨림과 어지럼증이 나타남"],
      [23,"기초대사량이란?","몸이 생명을 유지하기 위해 필요한 최소한의 에너지 양. 호흡·체온유지·심장박동에 소모됨 / 하루 총 에너지 소비의 60~75%를 차지"],
      [24,"일일 에너지 소비 형태 4가지와 에너지 대사량","기초대사량 / 활동대사량: 의도적·비의도적 움직임 / 식품 소화 대사량: 소화에 쓰임 / 적응 대사량: 환경 변화·스트레스에 반응"],
      [25,"아나볼릭과 카타볼릭(동화작용과 이화작용) 설명","아나볼릭: 작은 분자를 큰 분자로 합성하는 과정. 에너지 소비(근육 합성) / 카타볼릭: 큰 분자를 작은 분자로 분해해 에너지를 생산(음식물 소화)"],
      [26,"크레아틴을 섭취하는 이유","고강도 운동 시 고갈된 ATP를 빠르게 재합성 / 근육 내 인산크레아틴 저장량을 늘려 에너지 재충전 효율 향상 / 근력과 파워 증가, 고강도 운동 지속능력 향상"],
      [27,"카페인의 효과와 적정섭취량","피로를 유발하는 아데노신의 작용을 막아 피로감을 줄여줌. 지구력과 집중력 향상 / 적정 섭취량: 체중 1kg당 3~6mg / 운동 시작 30분~1시간 전 섭취"],
      [28,"음주가 운동 수행 능력에 미치는 영향","알코올은 에너지 생성 방해·탈수 유발·균형감각 저하 / 운동 후에는 단백질 합성 억제·수면 질 하락"],
      [29,"흡연이 운동 수행능력에 미치는 영향","일산화탄소는 혈액의 산소운반능력 저하 / 니코틴은 심장 부담 증가 / 결국 근육에 산소가 부족해져 쉽게 지치고 운동능력 감소"],
      [30,"수분의 역할과 섭취 이유","체온 조절·영양소와 산소 운반·노폐물 배출·주요장기 보호·신진대사 촉진 / 운동 중에는 체온상승 억제·탈수 방지"],
      [31,"공복 시 고강도운동 피해야 하는 이유","탄수화물이 부족해 운동수행능력 저하 / 에너지를 만들기 위해 근육을 분해해 근손실 유발 / 저혈당 쇼크 위험"],
      [32,"에너지원 부족 시 여성에게 발생할 수 있는 질환","월경기능 장애, 골밀도 저하, 섭식 장애"],
      [33,"카보로딩이란?","시합 전 탄수화물을 많이 먹어 글리코겐 저장량을 최대로 끌어올리는 전략 / 지구력 운동 선수들이 자주 함 / 보디빌딩에선 근육 내 수분을 채워 근육의 볼륨감·근선명도를 향상"],
      [34,"췌장에서 분비되는 인슐린의 역할","혈당이 높아졌을 때 췌장에서 분비됨 / 포도당을 세포 안으로 흡수시켜 혈당을 낮추고 남은 포도당을 간과 근육에 글리코겐 형태로 저장"],
      [35,"췌장에서 분비되는 글루카곤의 역할","공복이나 운동으로 혈당이 낮아졌을 때 췌장에서 분비되는 호르몬 / 간에 저장된 글리코겐을 포도당으로 분해해 혈액으로 방출 / 포도당 신생합성을 촉진해 혈당을 높임"],
      [36,"테스토스테론이란?","남성호르몬·동화호르몬. 단백질 합성 촉진·근육량 증가·2차 성징 발현·뼈 밀도 유지"],
      [37,"콜레스테롤과 HDL이란?","콜레스테롤: 세포막을 구성하고 호르몬을 만드는 필수 지방성분 / HDL(좋은 콜레스테롤): 혈관에 쌓인 잉여 콜레스테롤을 간으로 보냄"],
      [38,"교감신경과 부교감신경이란?","서로 반대작용을 하는 자율신경계 / 교감신경: 스트레스 상황에서 심박을 높이고 몸을 흥분시킴 / 부교감신경: 휴식 시 심박을 낮추고 소화를 촉진시킴"],
      [39,"신경 말단에서 분비되는 신경전달물질이란?","부교감신경의 말단: 아세틸콜린 / 교감신경의 말단: 노르에피네프린"],
      [40,"아세틸콜린 설명","부교감신경계를 대표하는 호르몬 / 휴식과 소화 담당, 심장박동을 늦추고 소화기능을 촉진 / 신체를 차분하게 만듦"],
      [41,"아드레날린 설명","아드레날린=에피네프린은 교감신경계를 대표하는 호르몬 / 스트레스 상황에 대응해 심박수와 혈당을 높여 신체 에너지를 동원함"],
      [42,"골지건 기관 설명","근육과 힘줄의 연결부위에 위치한 근육의 힘을 감지하는 센서 / 근육이 너무 강하게 수축하면 해당 근육을 이완시켜 근육과 힘줄 파열을 방지"],
      [43,"근방추 설명","근육 내부에 위치해 근육 길이와 길이 변화 속도를 감지하는 센서 / 근육이 갑자기 늘어나면 해당 근육을 수축시킴"],
      [44,"스포츠 심장 설명","장기간의 지구력 훈련에 적응해 나타나는 심장의 좋은 변화 / 좌심실 용적이 커지고 근육이 두꺼워져 한 번에 많은 혈액을 뿜어냄 / 안정시 심박수가 감소하고 운동 시 최대 심박출량이 증가"],
      [45,"심장 전도계의 순서","동방결절 → 방실결절 → 히스 다발 → 푸르키네 섬유 / 이 경로를 통해 전기신호가 심장 전체로 퍼져나감"],
      [46,"심장 자극 전도계 구성요소","동방결절: 최초의 전기신호를 만듦 / 방실결절: 신호를 잠깐 지연시킴 / 히스 다발: 신호를 심실로 전달 / 푸르키네 섬유: 심실 전체를 수축시킴"],
      [47,"심폐계의 정의와 기능","심장·폐·혈관을 아우르는 통합시스템 / 혈액 순환을 통해 몸의 모든 세포에 산소와 영양소 공급, 이산화탄소와 노폐물 제거"],
      [48,"체순환 설명","좌심실에서 출발한 산소가 많은 동맥혈이 대동맥을 통해 온 몸에 산소를 공급한 후, 이산화탄소를 받은 정맥혈이 되어 대정맥을 통해 우심방으로 돌아옴"],
      [49,"폐순환 설명","우심실에서 출발한 산소가 적은 정맥혈이 폐동맥을 거쳐 폐로 가서 가스 교환을 통해 산소를 얻은 후, 산소가 풍부한 동맥혈이 되어 폐정맥을 통해 좌심방으로 돌아옴"],
      [50,"심박출량 정의와 구하는 공식","심장이 1분동안 뿜어내는 혈액의 총량. 심폐기능의 효율성을 나타냄 / 심박출량 = 1회 박출량 × 심박수"],
      [51,"안정시 심박수 측정방법","맥박촉진법으로 측정 / 손목의 요골동맥이나 목의 경동맥에 검지와 중지를 대고 15초동안 맥박수를 재고 4를 곱하여 분당심박수를 계산"],
      [52,"인바디 실시 시 주의사항","공복 유지, 운동이나 샤워 전 측정 / 기상 직후나 월경 주기 피하기 / 매번 동일한 조건에서 측정"],
      [53,"호흡교환율(RER) 설명","내쉰 이산화탄소 양을 들이마신 산소 양으로 나눔(이산화탄소/산소) / 이 비율을 통해 운동 강도와 에너지를 만들 때 많이 쓰는 영양소 파악 가능"],
      [54,"최대 산소 섭취량","격한 운동 중에 몸이 섭취하고 활용할 수 있는 산소의 최대량 / 심폐지구력을 나타내는 대표적인 지표"],
      [55,"운동 후 초과산소섭취량(EPOC) 설명","운동 후 몸이 안정상태로 돌아가기 위해 추가로 소모하는 산소량. 에프터번 효과로 불림 / 고강도 운동 시 오래 지속 / 역할: 운동 중 고갈된 ATP·PC 재합성, 체온 조절, 심박수·호흡 안정, 노폐물 제거"],
      [56,"대사당량(MET)에 대해 설명","신체활동의 강도를 나타내는 단위 / 1MET는 편하게 앉아 쉴 때 소비하는 산소량 / 3MET라면 쉬고 있을 때보다 에너지를 3배 더 쓴다는 의미"],

  '🤝 스포츠 인권': '스포츠인권',
  '⚡ 운동생리학': '운동생리학',
  '🦴 기능 해부학': '기능해부학',
  '🏋️ 웨이트 트레이닝': '웨이트트레이닝',
  '🥗 운동 영양학': '운동영양학',
  '🏃 생활체육 개요': '생활체육',
};

function jumpTo(id) {
  const qSection = document.getElementById('tab-q');
  if (!qSection.classList.contains('visible')) {
    showTab('q');
  }
  setTimeout(() => {
    const el = document.getElementById('chapter-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function positionTooltip(btn) {
  const tooltip = btn.querySelector('.answer-tooltip');
  const rect = btn.getBoundingClientRect();
  const tipW = Math.min(340, window.innerWidth * 0.88);
  let left = rect.left;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  if (left < 8) left = 8;
  tooltip.style.left = left + 'px';
  tooltip.style.top = (rect.top - 8) + 'px';
  tooltip.style.transform = 'translateY(-100%)';
}

function buildChapters() {
  const qSection = document.getElementById('tab-q');
  const aSection = document.getElementById('tab-a');

  chapters.forEach(ch => {

    // ══ 비교표 타입 ══
    if (ch.type === 'comparison') {
      // 문제지: 빈칸 비교표
      const qChap = document.createElement('div');
      qChap.className = 'chapter';
      const chId = chapterIdMap[ch.title] || '';
      let qHtml = `<div class="chapter-title blue" id="chapter-${chId}">${ch.title}</div>
        <div class="comp-wrap"><table class="comp-table">
          <thead><tr>
            <th class="row-head" style="width:90px">구분</th>
            ${ch.cols.map(c => `<th>${c}</th>`).join('')}
          </tr></thead><tbody>`;
      ch.rows.forEach(row => {
        qHtml += `<tr><td class="row-label">${row.label}</td>
          ${row.data.map((d) => `<td><textarea class="blank-cell" rows="2" placeholder="답변..."
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <div class="btn-row">
              <button class="reset-btn" onclick="const ta=this.closest('td').querySelector('textarea');ta.value='';ta.style.height='auto';">↺ 초기화</button>
              <button class="answer-btn" data-answer="${escapeHtml(d)}">💡 정답<span class="answer-tooltip">${escapeHtml(d)}</span></button>
            </div></td>`).join('')}
        </tr>`;
      });
      qHtml += `</tbody></table></div>`;
      qChap.innerHTML = qHtml;
      qChap.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isActive = btn.classList.contains('active');
          document.querySelectorAll('.answer-btn.active').forEach(b => b.classList.remove('active'));
          if (!isActive) {
            positionTooltip(btn);
            btn.classList.add('active');
          }
        });
      });
      qSection.appendChild(qChap);

      // 답지: 정답 비교표
      const aChap = document.createElement('div');
      aChap.className = 'chapter';
      let aHtml = `<div class="chapter-title green">${ch.title} — 정답</div>
        <div class="comp-wrap"><table class="comp-table">
          <thead><tr>
            <th class="row-head" style="width:90px">구분</th>
            ${ch.cols.map(c => `<th>${c}</th>`).join('')}
          </tr></thead><tbody>`;
      ch.rows.forEach(row => {
        aHtml += `<tr><td class="row-label">${row.label}</td>
          ${row.data.map(d => `<td style="white-space:pre-wrap"><span class="answer-text">${escapeHtml(d)}</span></td>`).join('')}
        </tr>`;
      });
      aHtml += `</tbody></table></div>`;
      aChap.innerHTML = aHtml;
      aSection.appendChild(aChap);
      return;
    }

    // ── 일반 타입 ──
    const qChap = document.createElement('div');
    qChap.className = 'chapter';
    const chId = chapterIdMap[ch.title] || '';
    qChap.innerHTML = `
      <div class="chapter-title blue" id="chapter-${chId}">${ch.title}</div>
      <table class="q-table">
        <thead><tr>
          <th class="blue center" style="width:40px">번호</th>
          <th class="blue">질문</th>
          <th class="blue">나의 답변</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    `;
    const qTbody = qChap.querySelector('tbody');

    ch.data.forEach(([n, q, a]) => {
      const safeA = escapeHtml(a);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="num-cell">${n}</td>
        <td class="q-cell">${escapeHtml(q)}</td>
        <td>
          <textarea class="blank-cell" rows="1" placeholder="여기에 답변을 입력하세요..."
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <div class="btn-row">
            <button class="reset-btn" onclick="const ta=this.closest('td').querySelector('textarea');ta.value='';ta.style.height='auto';">↺ 초기화</button>
            <button class="answer-btn">💡 정답<span class="answer-tooltip">${safeA}</span></button>
          </div>
        </td>
      `;
      qTbody.appendChild(tr);

      const btn = tr.querySelector('.answer-btn');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isActive = btn.classList.contains('active');
        document.querySelectorAll('.answer-btn.active').forEach(b => b.classList.remove('active'));
        if (!isActive) {
          positionTooltip(btn);
          btn.classList.add('active');
        }
      });
    });

    qSection.appendChild(qChap);

    // ── 답지 챕터 ──
    const aChap = document.createElement('div');
    aChap.className = 'chapter';
    aChap.innerHTML = `
      <div class="chapter-title green">${ch.title} — 정답</div>
      <table class="q-table">
        <thead><tr>
          <th class="green center" style="width:40px">번호</th>
          <th class="green" style="width:36%">질문</th>
          <th class="green">정답</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    `;
    const aTbody = aChap.querySelector('tbody');

    (ch.data || []).forEach(([n, q, a]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="num-cell">${n}</td>
        <td class="q-cell">${escapeHtml(q)}</td>
        <td class="ans-cell"><span class="answer-text">${escapeHtml(a)}</span></td>
      `;
      aTbody.appendChild(tr);
    });

    aSection.appendChild(aChap);
  });
}

function showTab(tab) {
  document.getElementById('tab-q').classList.toggle('visible', tab === 'q');
  document.getElementById('tab-a').classList.toggle('visible', tab === 'a');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.remove('active-q', 'active-a');
    if (tab === 'q' && i === 0) btn.classList.add('active-q');
    if (tab === 'a' && i === 1) btn.classList.add('active-a');
  });
}

buildChapters();

// 다른 곳 클릭 시 열린 정답 닫기
document.addEventListener('click', () => {
  document.querySelectorAll('.answer-btn.active').forEach(b => b.classList.remove('active'));
});
</script>
